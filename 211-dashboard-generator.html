<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>211 Dashboard Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"><\/script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f3f5;min-height:100vh;display:flex;flex-direction:column;}
header{background:linear-gradient(135deg,#0d2c4a,#1a5276);color:#fff;padding:20px 32px;}
header h1{font-size:1.4rem;font-weight:700;}
header p{font-size:.82rem;opacity:.7;margin-top:4px;}
.container{max-width:780px;margin:40px auto;padding:0 24px;width:100%;}
.card{background:#fff;border-radius:14px;padding:32px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:24px;}
.card h2{font-size:1.05rem;font-weight:700;color:#1a5276;margin-bottom:6px;}
.card p{font-size:.85rem;color:#7f8c8d;margin-bottom:24px;line-height:1.5;}
.zones{display:flex;flex-direction:column;gap:14px;}
.zone{border:2px dashed #d5d8dc;border-radius:10px;padding:20px 24px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:border-color .2s,background .2s;position:relative;}
.zone:hover{border-color:#1a5276;background:#f4f7fb;}
.zone.done{border-color:#148f77;background:#f0faf7;border-style:solid;}
.zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.zone-icon{font-size:1.8rem;flex-shrink:0;}
.zone-info{flex:1;}
.zone-label{font-weight:700;font-size:.9rem;color:#2c3e50;}
.zone-hint{font-size:.75rem;color:#7f8c8d;margin-top:2px;}
.zone-name{font-size:.78rem;color:#148f77;font-weight:600;margin-top:4px;}
.check{font-size:1.3rem;flex-shrink:0;opacity:0;transition:opacity .2s;}
.zone.done .check{opacity:1;}
.btn-generate{width:100%;padding:16px;background:#1a5276;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;transition:background .2s;margin-top:8px;}
.btn-generate:hover:not(:disabled){background:#154360;}
.btn-generate:disabled{background:#aab7c4;cursor:not-allowed;}
.progress{display:none;margin-top:16px;}
.progress-bar{height:8px;background:#eee;border-radius:4px;overflow:hidden;}
.progress-fill{height:8px;background:#1a5276;border-radius:4px;width:0%;transition:width .3s;}
.progress-label{font-size:.8rem;color:#7f8c8d;margin-top:6px;text-align:center;}
.result{display:none;margin-top:20px;background:#f0faf7;border:1px solid #a9dfbf;border-radius:10px;padding:20px 24px;}
.result h3{color:#148f77;font-weight:700;margin-bottom:6px;}
.result p{font-size:.85rem;color:#2c3e50;margin-bottom:14px;}
.btn-download{display:inline-block;padding:12px 28px;background:#148f77;color:#fff;border:none;border-radius:8px;font-size:.92rem;font-weight:700;cursor:pointer;text-decoration:none;transition:background .2s;}
.btn-download:hover{background:#0e6655;}
.instructions{background:#fff;border-radius:14px;padding:28px 32px;box-shadow:0 2px 12px rgba(0,0,0,.08);}
.instructions h2{font-size:1rem;font-weight:700;color:#1a5276;margin-bottom:14px;}
.step{display:flex;gap:14px;margin-bottom:14px;align-items:flex-start;}
.step-num{background:#1a5276;color:#fff;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:800;flex-shrink:0;margin-top:1px;}
.step-text{font-size:.85rem;color:#2c3e50;line-height:1.5;}
.step-text strong{color:#1a5276;}
</style>
</head>
<body>
<header>
  <h1>211 Community Dashboard Generator</h1>
  <p>Upload your three iCarol CSV exports &mdash; get a ready-to-publish index.html in seconds</p>
</header>
<div class="container">
  <div class="card">
    <h2>Upload iCarol Exports</h2>
    <p>Export your three Data Dashboard II files from iCarol and drop them below. Everything is processed locally in your browser &mdash; no data is sent anywhere.</p>
    <div class="zones">
      <div class="zone" id="zone1">
        <input type="file" accept=".csv" id="file1" onchange="fileSelected(1,this)">
        <div class="zone-icon">📋</div>
        <div class="zone-info">
          <div class="zone-label">Call Report CSV</div>
          <div class="zone-hint">iCarol export #1 &mdash; contains contacts, dates, gender, age, county, zip</div>
          <div class="zone-name" id="name1"></div>
        </div>
        <div class="check">✅</div>
      </div>
      <div class="zone" id="zone2">
        <input type="file" accept=".csv" id="file2" onchange="fileSelected(2,this)">
        <div class="zone-icon">🔗</div>
        <div class="zone-info">
          <div class="zone-label">Referrals CSV</div>
          <div class="zone-hint">iCarol export #2 &mdash; contains referrals linked to call reports</div>
          <div class="zone-name" id="name2"></div>
        </div>
        <div class="check">✅</div>
      </div>
      <div class="zone" id="zone3">
        <input type="file" accept=".csv" id="file3" onchange="fileSelected(3,this)">
        <div class="zone-icon">📊</div>
        <div class="zone-info">
          <div class="zone-label">Needs CSV</div>
          <div class="zone-hint">iCarol export #3 &mdash; contains need categories, met/unmet status, reasons</div>
          <div class="zone-name" id="name3"></div>
        </div>
        <div class="check">✅</div>
      </div>
    </div>
    <button class="btn-generate" id="genBtn" onclick="generate()" disabled>Generate Dashboard</button>
    <div class="progress" id="progressDiv">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-label" id="progressLabel">Processing…</div>
    </div>
    <div class="result" id="resultDiv">
      <h3>✅ Dashboard Ready!</h3>
      <p id="resultStats"></p>
      <button class="btn-download" onclick="downloadResult()">⬇ Download index.html</button>
    </div>
  </div>
  <div class="instructions">
    <h2>How to update the dashboard</h2>
    <div class="step"><div class="step-num">1</div><div class="step-text">Log into <strong>iCarol</strong> and run your Data Dashboard II export to get the three CSV files.</div></div>
    <div class="step"><div class="step-num">2</div><div class="step-text">Open this <strong>Generator</strong> page in any browser and upload the three CSV files above.</div></div>
    <div class="step"><div class="step-num">3</div><div class="step-text">Click <strong>Generate Dashboard</strong> and download the new <code>index.html</code>.</div></div>
    <div class="step"><div class="step-num">4</div><div class="step-text">Go to your <strong>GitHub repository</strong>, delete the old <code>index.html</code>, and upload the new one. Your live public dashboard updates automatically.</div></div>
  </div>
</div>
<script>
const files={1:null,2:null,3:null};
let generatedHTML='';

function fileSelected(n,input){
  if(!input.files[0])return;
  files[n]=input.files[0];
  document.getElementById('zone'+n).classList.add('done');
  document.getElementById('name'+n).textContent=input.files[0].name;
  checkReady();
}
function checkReady(){
  document.getElementById('genBtn').disabled=!(files[1]&&files[2]&&files[3]);
}

function setProgress(pct,label){
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressLabel').textContent=label;
}

function generate(){
  document.getElementById('progressDiv').style.display='block';
  document.getElementById('resultDiv').style.display='none';
  document.getElementById('genBtn').disabled=true;
  setProgress(5,'Reading Call Report…');

  // detect latest date across all files for the header
  let latestDateStr='';

  setTimeout(()=>{
    Papa.parse(files[1],{header:true,skipEmptyLines:true,complete:function(r1){
      setProgress(25,'Reading Referrals…');
      setTimeout(()=>{
        Papa.parse(files[2],{header:true,skipEmptyLines:true,complete:function(r2){
          setProgress(45,'Reading Needs…');
          setTimeout(()=>{
            Papa.parse(files[3],{header:true,skipEmptyLines:true,complete:function(r3){
              setProgress(60,'Processing data…');
              setTimeout(()=>{
                try{
                  const result=processData(r1.data,r2.data,r3.data);
                  setProgress(85,'Building dashboard…');
                  setTimeout(()=>{
                    buildHTML(result);
                    setProgress(100,'Done!');
                    document.getElementById('resultStats').textContent=
                      result.contacts.length.toLocaleString()+' contacts · '+
                      result.referrals.length.toLocaleString()+' referrals · '+
                      result.needs.length.toLocaleString()+' needs';
                    document.getElementById('resultDiv').style.display='block';
                    document.getElementById('genBtn').disabled=false;
                  },200);
                }catch(e){alert('Error processing data: '+e.message);document.getElementById('genBtn').disabled=false;}
              },50);
            }});
          },50);
        }});
      },50);
    }});
  },50);
}

function processData(crRows,refRows,needRows){
  const genders=[],gender_map={},zips=[],zip_map={},counties=[],county_map={},
        ages=[],age_map={},cats=[],cat_map={},months=[],month_map={},
        reasons=[],reason_map={};

  function idx(val,lst,mp){val=(val||'').trim();if(!(val in mp)){mp[val]=lst.length;lst.push(val);}return mp[val];}

  const contacts=[],num_to_ci={};
  crRows.forEach(row=>{
    const num=(row['Call Report Num']||'').trim();
    const ci=contacts.length;
    num_to_ci[num]=ci;
    contacts.push([
      idx((row['Date']||'').slice(0,7),months,month_map),
      idx(row['Gender']||'',genders,gender_map),
      idx(row['Zip Code']||'',zips,zip_map),
      idx(row['County']||'',counties,county_map),
      idx(row['Age']||'',ages,age_map),
    ]);
  });

  const referrals=[];
  refRows.forEach(row=>{
    const num=(row['Call Report Num']||'').trim();
    referrals.push([
      num_to_ci[num]??-1,
      idx(row['County']||'',counties,county_map),
      idx(row['Zip Code']||'',zips,zip_map),
    ]);
  });

  const needs=[];
  needRows.forEach(row=>{
    const num=(row['Call Report Num']||'').trim();
    const unmet=(row['Need Met/Unmet']||'').trim()==='True'?1:0;
    const reason=(row['Reason']||'').trim();
    needs.push([
      num_to_ci[num]??-1,
      idx(row['Need Category']||'',cats,cat_map),
      unmet,
      idx(row['County']||'',counties,county_map),
      idx(row['Zip Code']||'',zips,zip_map),
      idx(reason||'Not Specified',reasons,reason_map),
    ]);
  });

  // detect latest month for header
  const sortedMonths=months.filter(m=>m).sort();
  const latestMonth=sortedMonths[sortedMonths.length-1]||'';
  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  let exportDateStr='';
  if(latestMonth){const[y,m]=latestMonth.split('-');exportDateStr='Data through '+monthNames[parseInt(m)-1]+' '+y;}

  return{contacts,referrals,needs,dicts:{months,genders,zips,counties,ages,cats,reasons},exportDateStr};
}
